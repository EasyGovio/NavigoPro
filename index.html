["Wenn Sie eine Auszeichnung erhalten, die Sie nicht verdient haben, fühlen Sie sich unwohl.","Bei Einstellungen sollte Leistung entscheidender sein als Erfahrung.","Projekte für benachteiligte Gruppen begeistern Sie.","Aktiv Ungleichheit zu reduzieren ist Ihre Verantwortung.","Der gesellschaftliche Beitrag Ihrer Branche ist für Berufswahl entscheidend.","Leistungsbewertung ohne Chancengleichheit ist für Sie sinnlos.","Bei Ungerechtigkeit ergreifen Sie Massnahmen zur Veränderung.","Klimawandel und Umwelt beeinflussen Ihre Berufsentscheidungen.","Migration und Integration interessieren Sie persönlich und beruflich.","Digitale Spaltung ist ein Problem, das gelöst werden muss.","Mitarbeiterwohl sollte vor Aktionärsrendite kommen.","Sozialunternehmertum ist sinnvoller als traditionelles Unternehmertum.","Einkommensungleichheit beunruhigt Sie persönlich und beruflich.","Messbaren sozialen Nutzen zu schaffen ist Kernmotivation Ihrer Karriere.","Ein Beruf, der viel verdient aber keinen gesellschaftlichen Nutzen bringt, ist nicht geeignet."],
["Wenn Sie etwas mit eigenen Händen fertigstellen, empfinden Sie tiefe Zufriedenheit.","Etwas Defektes zu reparieren ist eine Herausforderung für Sie.","Möbelaufbau und Reparaturen machen Ihnen Freude.","Sie lieben es, ein Werkzeug zu verstehen, indem Sie es ausprobieren.","Sie produzieren lieber physisch, als am Computer zu sitzen.","Um Maschinen zu verstehen, probieren Sie lieber praktisch als Handbuch zu lesen.","Schreinerei, Elektrik oder handwerkliche Kurse interessieren Sie.","Die Idee, eigener Chef zu sein, begeistert Sie.","Sie möchten ein Handwerk meistern und eine eigene Werkstatt eröffnen.","Ein neues Werkzeug oder eine Maschine zu lernen begeistert Sie.","Lernen in der Meister-Lehrling-Beziehung ist ideal für Sie.","Sie achten auf kleinste Details bei Ihrer Arbeit.","Qualität ist Ihnen wichtiger als Geschwindigkeit.","Für die Langlebigkeit eines Produkts geben Sie extra Mühe.","Sie möchten Arbeit in einer Qualität abliefern, die Sie stolz unterschreiben können."],
["Selbst in stressigen Zeiten achten Sie auf Ihren Schlafrhythmus.","Bewegung ist für Sie Bedürfnis, keine Pflicht.","Work-Life-Balance ist eine nicht verhandelbare Grenze für Sie.","Ihnen ist bewusst, dass emotionale Verfassung die Arbeitsleistung beeinflusst.","Ernährungsgewohnheiten prägen Ihre langfristige Gesundheit, das glauben Sie.","Bei starkem Stress nehmen Sie die Signale Ihres Körpers wahr.","Psychische Gesundheit ist genauso wichtig wie physische.","Regelmässige Gesundheitschecks sind für Sie Priorität.","Sie glauben, dass chronische Krankheiten mit dem Lebensstil zusammenhängen.","Zeit ohne digitale Bildschirme tut Ihnen gut.","Starke soziale Bindungen sind für psychische Gesundheit wichtig.","Gesund zu sein ist Grundvoraussetzung für beruflichen Erfolg.","Kurze Pausen während des Tages steigern Ihre Produktivität.","In Ihre Gesundheit zu investieren ist die beste Investition.","Gesundheitskompetenz ist eine grundlegende Fähigkeit, die jeder haben sollte."]
]
};

var LIKERT_LABELS = {
tr: ["Kesinlikle Katılmıyorum","Katılmıyorum","Kararsızım","Katılıyorum","Kesinlikle Katılıyorum"],
en: ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"],
de: ["Stimme gar nicht zu","Stimme nicht zu","Unentschieden","Stimme zu","Stimme voll zu"]
};
var LIKERT_VALUES = [0, 1.25, 2.5, 3.75, 5];

var lang = "tr";
var state = "lang";
var modAnswers = [[],[],[],[],[],[]];
var curMod = 0;
var curQ = 0;
var modScores = [0,0,0,0,0,0];

function getView() { return document.getElementById("dynamicView"); }

function render() {
var v = getView();
if (!v) return;
if (state === "lang") renderLang(v);
else if (state === "entry") renderEntry(v);
else if (state === "module") renderModule(v);
else if (state === "inter") renderInter(v);
else if (state === "report") renderReport(v);
window.scrollTo(0, 0);
}

function renderLang(v) {
var t = lang === "tr" ? "6 modül, 90 soru ile kariyer profilinizi keşfedin." :
lang === "de" ? "Entdecken Sie Ihr Karriereprofil mit 6 Modulen, 90 Fragen." :
"Discover your career profile with 6 modules, 90 questions.";
var btn = lang === "tr" ? "Başla" : lang === "de" ? "Starten" : "Start";
v.innerHTML = '<div class="lang-selector">'
+ '<button class="lang-btn ' + (lang==='tr'?'active':'') + '" onclick="setLang(\'tr\')">🇹🇷 TÜRKÇE</button>'
+ '<button class="lang-btn ' + (lang==='de'?'active':'') + '" onclick="setLang(\'de\')">🇩🇪 DEUTSCH</button>'
+ '<button class="lang-btn ' + (lang==='en'?'active':'') + '" onclick="setLang(\'en\')">🇬🇧 ENGLISH</button>'
+ '</div>'
+ '<div class="start-card">'
+ '<h2>🧭 NavigoPro | PACDI</h2>'
+ '<p>' + t + '</p>'
+ '<button class="btn-primary" onclick="goEntry()">' + btn + '</button>'
+ '</div>';
}

function setLang(l) { lang = l; render(); }
function goEntry() { state = "entry"; render(); }

function renderEntry(v) {
var title = lang==="tr" ? "Kariyer Değerlendirmesine Hoş Geldiniz" :
lang==="de" ? "Willkommen zur Karrierebewertung" : "Welcome to Career Assessment";
var desc = lang==="tr" ? "6 modül, her biri 15 soru. Geri dönüp cevapları değiştirebilirsiniz." :
lang==="de" ? "6 Module, je 15 Fragen. Sie können zurück und Antworten ändern." :
"6 modules, 15 questions each. You can go back and change answers.";
var btn = lang==="tr" ? "Modül 1'e Başla" : lang==="de" ? "Modul 1 starten" : "Start Module 1";
v.innerHTML = '<div class="start-card"><h2>📋 ' + title + '</h2><p>' + desc + '</p>'
+ '<button class="btn-primary" onclick="goModule()">' + btn + '</button></div>';
}

function goModule() { curMod = 0; curQ = 0; modAnswers = [[],[],[],[],[],[]]; state = "module"; render(); }

function renderModule(v) {
var qText = QUESTIONS[lang][curMod][curQ];
var selVal = modAnswers[curMod][curQ];
var pct = (curQ / 15) * 100;
var modName = MODULE_NAMES[lang][curMod];
var icon = MODULE_ICONS[curMod];
var isLast = curQ === 14;
var nextLbl = isLast ? (lang==="tr"?"Modülü Bitir":lang==="de"?"Modul abschliessen":"Finish Module") :
(lang==="tr"?"İleri →":lang==="de"?"Weiter →":"Next →");
var backLbl = lang==="tr" ? "← Geri" : lang==="de" ? "← Zurück" : "← Back";
var modLbl = lang==="tr" ? "Modül " + (curMod+1) + "/6" : "Module " + (curMod+1) + "/6";
var qLbl = lang==="tr" ? "Soru " + (curQ+1) + " / 15" : "Question " + (curQ+1) + " / 15";

var optsHtml = LIKERT_LABELS[lang].map(function(lbl, idx) {
    var val = LIKERT_VALUES[idx];
    var sel = selVal !== undefined && Math.abs(selVal - val) < 0.01;
    return '<div class="option' + (sel?' selected':'') + '" onclick="selectOpt(' + val + ')">' + lbl + '</div>';
}).join('');

v.innerHTML = '<div class="module-header">'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + '<span class="module-icon">' + icon + '</span>'
    + '<span class="module-title">' + modName + '</span>'
    + '</div>'
    + '<span style="color:#5b7a97;font-size:0.9rem">' + modLbl + '</span>'
    + '</div>'
    + '<div class="progress-area"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="q-counter">' + qLbl + '</div>'
    + '<div class="question-text">' + qText + '</div>'
    + '<div class="options">' + optsHtml + '</div>'
    + '<div class="nav-buttons">'
    + '<button class="btn-nav" onclick="goBack()" ' + (curQ===0?'disabled':'') + ' style="' + (curQ===0?'opacity:0.4':'') + '">' + backLbl + '</button>'
    + '<button class="btn-nav btn-next" onclick="goNext()">' + nextLbl + '</button>'
    + '</div>'
    + '<div class="warning" id="warn"></div>';
}

function selectOpt(val) {
modAnswers[curMod][curQ] = val;
render();
}

function goBack() {
if (curQ > 0) { curQ = curQ - 1; render(); }
}

function goNext() {
if (modAnswers[curMod][curQ] === undefined) {
var warn = document.getElementById("warn");
if (warn) warn.textContent = lang==="tr" ? "Lütfen bir cevap seçin." :
lang==="de" ? "Bitte wählen Sie eine Antwort." :
"Please select an answer.";
return;
}
if (curQ === 14) {
var sum = 0;
for (var i = 0; i < modAnswers[curMod].length; i++) { sum += modAnswers[curMod][i]; }
modScores[curMod] = sum / 15;
state = "inter";
render();
} else {
curQ = curQ + 1;
render();
}
}

function renderInter(v) {
var score = modScores[curMod];
var msgs = {
tr: ["Harika ilerliyorsun! 💪","Kendini tanımaya devam et 🌟","Güçlü yönlerin ortaya çıkıyor ✨"],
de: ["Grossartig! Weiter so 💪","Erkenne dich selbst 🌟","Deine Stärken werden sichtbar ✨"],
en: ["Great progress! 💪","Keep discovering yourself 🌟","Your strengths are emerging ✨"]
};
var msg = msgs[lang][Math.floor(Math.random() * 3)];
var title = lang==="tr" ? "Modül " + (curMod+1) + " Tamamlandı ✅" :
lang==="de" ? "Modul " + (curMod+1) + " abgeschlossen ✅" :
"Module " + (curMod+1) + " Completed ✅";
var nextBtn = curMod < 5 ?
(lang==="tr" ? "Modül " + (curMod+2) + "'ye Geç →" : lang==="de" ? "Modul " + (curMod+2) + " starten →" : "Start Module " + (curMod+2) + " →") :
(lang==="tr" ? "Raporu Görüntüle →" : lang==="de" ? "Bericht anzeigen →" : "View Report →");

v.innerHTML = '<div class="inter-card">'
    + '<h3>' + title + '</h3>'
    + '<div class="score-circle" id="animScore">0.0</div>'
    + '<p class="motivation">' + msg + '</p>'
    + '<button class="btn-primary" onclick="goNextMod()">' + nextBtn + '</button>'
    + '</div>';

var animVal = 0;
var interval = setInterval(function() {
    var el = document.getElementById("animScore");
    if (!el) { clearInterval(interval); return; }
    if (animVal + 0.15 >= score) {
        el.textContent = score.toFixed(1);
        clearInterval(interval);
    } else {
        animVal += 0.15;
        el.textContent = animVal.toFixed(1);
    }
}, 20);
}

function goNextMod() {
if (curMod < 5) { curMod++; curQ = 0; state = "module"; render(); }
else { state = "report"; render(); }
}

function renderReport(v) {
var avg = 0;
for (var i = 0; i < modScores.length; i++) { avg += modScores[i]; }
avg = avg / 6;

var thr = [4.0, 4.0, 4.0, 4.0, 3.5, 4.0];
var high = [];
for (var i = 0; i < modScores.length; i++) {
    if (modScores[i] >= thr[i]) high.push(i);
}

var profileNames = {
    tr: ["Etik Lider","Analitik Düşünür","Tutkulu Profesyonel","Sosyal Dönüştürücü","Usta Adayı","Bilinçli Yaşam Savunucusu"],
    en: ["Ethical Leader","Analytical Thinker","Passionate Professional","Social Transformer","Craft Master Candidate","Conscious Living Advocate"],
    de: ["Ethische Führungskraft","Analytischer Denker","Leidenschaftlicher Profi","Sozialer Transformator","Meister-Anwärter","Bewusster Lebensadvokat"]
};

var profileName;
if (high.length === 1) {
    profileName = profileNames[lang][high[0]];
} else if (high.length > 1) {
    var parts = [];
    for (var i = 0; i < high.length; i++) { parts.push(MODULE_NAMES[lang][high[i]].split(" ")[0]); }
    profileName = parts.join(" + ") + (lang==="tr" ? " Bileşik Profili" : lang==="de" ? " Kombiniertes Profil" : " Combined Profile");
} else {
    profileName = lang==="tr" ? "Gelişim Odaklı Profil" : lang==="de" ? "Entwicklungsorientiertes Profil" : "Growth-Oriented Profile";
}

var careerMap = {
    tr: ["Etik Danışmanlık, Kurumsal Yönetişim","Veri Analizi, Stratejik Planlama","Girişimcilik, Yaratıcı Endüstriler","Sivil Toplum, Kamu Politikası","Ustalık Girişimciliği, Teknik Tasarım","Sağlık Yönetimi, Wellness Koçluğu"],
    en: ["Ethics Consulting, Corporate Governance","Data Analysis, Strategic Planning","Entrepreneurship, Creative Industries","Civil Society, Public Policy","Craft Entrepreneurship, Technical Design","Health Management, Wellness Coaching"],
    de: ["Ethikberatung, Corporate Governance","Datenanalyse, Strategische Planung","Unternehmertum, Kreativwirtschaft","Zivilgesellschaft, Öffentliche Politik","Handwerksunternehmertum, Technisches Design","Gesundheitsmanagement, Wellness-Coaching"]
};

var careers = [];
if (high.length > 0) {
    for (var i = 0; i < high.length; i++) { careers.push(careerMap[lang][high[i]]); }
} else {
    careers = [careerMap[lang][0], careerMap[lang][1], careerMap[lang][2]];
}
while (careers.length < 3) { careers.push(lang==="tr" ? "Danışmanlık, Liderlik Gelişimi" : lang==="de" ? "Beratung, Führungsentwicklung" : "Consulting, Leadership Development"); }
careers = careers.slice(0, 3);

var barsHtml = modScores.map(function(s, i) {
    return '<div class="bar-item">'
        + '<div class="bar-label">' + MODULE_ICONS[i] + ' ' + MODULE_NAMES[lang][i] + '</div>'
        + '<div class="bar-bg"><div class="bar-fill" data-w="' + (s/5*100).toFixed(0) + '" style="width:0%;background:' + MODULE_COLORS[i] + '"></div></div>'
        + '<div class="bar-score">' + s.toFixed(1) + '</div>'
        + '</div>';
}).join('');

var hwBadge = modScores[4] >= 3.5 ? '<div class="special-badge">🔧 ' + (lang==="tr"?"Usta Adayı Kartı":lang==="de"?"Meister-Anwärter":"Master Candidate") + '</div>' : '';
var wbBadge = modScores[5] >= 4.0 ? '<div class="special-badge">🌿 ' + (lang==="tr"?"Bilinçli Yaşam Kartı":lang==="de"?"Bewusstes-Leben Karte":"Conscious Living Card") + '</div>' : '';

var labels = lang==="tr" ? ["Modül Skorları","PACDI Radar","Ana Profiliniz","PACDI Genel Skor","Önerilen Kariyer Alanları","Geri bildirim"] :
             lang==="en" ? ["Module Scores","PACDI Radar","Your Main Profile","PACDI Overall Score","Recommended Career Areas","Feedback"] :
                           ["Modul-Scores","PACDI Radar","Ihr Hauptprofil","PACDI Gesamtscore","Empfohlene Karrierefelder","Feedback"];

var careerItems = careers.map(function(c) { return '<li>🎯 ' + c + '</li>'; }).join('');

v.innerHTML = '<div class="report-grid">'
    + '<div class="bars-container"><h3>📊 ' + labels[0] + '</h3>' + barsHtml + '</div>'
    + '<div class="radar-container"><h3>🎯 ' + labels[1] + '</h3><canvas id="radarC" width="360" height="360"></canvas></div>'
    + '<div class="profile-card">'
    + '<h3>🏆 ' + labels[2] + '</h3>'
    + '<div class="profile-name">' + profileName + '</div>'
    + '<div class="profile-score">' + labels[3] + ': <strong>' + avg.toFixed(2) + ' / 5.0</strong></div>'
    + '<div class="special-badges">' + hwBadge + wbBadge + '</div>'
    + '<h4>✨ ' + labels[4] + '</h4>'
    + '<ul class="career-list">' + careerItems + '</ul>'
    + '<div class="feedback-section" style="margin-top:16px">'
    + '<p>📧 ' + labels[5] + ': <a href="mailto:info@navigopro.de">info@navigopro.de</a></p>'
    + '</div>'
    + '</div>'
    + '<div class="footer-note">© 2026 PACDI — navigopro.de · info@navigopro.de<br>TÜRKPATENT Tescil Başvurusu · Lisanslı Değerlendirme Aracı</div>'
    + '</div>';

setTimeout(function() {
    document.querySelectorAll(".bar-fill").forEach(function(el) { el.style.width = el.dataset.w + "%"; });
    drawRadar();
}, 100);
}

function drawRadar() {
var canvas = document.getElementById("radarC");
if (!canvas) return;
var ctx = canvas.getContext("2d");
var W = 360, H = 360, cx = W/2, cy = H/2, R = 130;
canvas.width = W; canvas.height = H;
var angles = [0,60,120,180,240,300].map(function(d) { return d * Math.PI / 180 - Math.PI/2; });
var vals = modScores.map(function(s) { return s / 5; });

ctx.clearRect(0, 0, W, H);

for (var lv = 1; lv <= 5; lv++) {
    ctx.beginPath();
    angles.forEach(function(a, i) {
        var r = R * lv / 5;
        var x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = "#dde3ec";
    ctx.lineWidth = 1;
    ctx.stroke();
}

angles.forEach(function(a) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = "#dde3ec";
    ctx.stroke();
});

ctx.beginPath();
vals.forEach(function(v, i) {
    var x = cx + R * v * Math.cos(angles[i]);
    var y = cy + R * v * Math.sin(angles[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
});
ctx.closePath();
ctx.fillStyle = "rgba(4,22,46,0.15)";
ctx.fill();
ctx.strokeStyle = "#F6B45F";
ctx.lineWidth = 2.5;
ctx.stroke();

vals.forEach(function(v, i) {
    var x = cx + R * v * Math.cos(angles[i]);
    var y = cy + R * v * Math.sin(angles[i]);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, 2 * Math.PI);
    ctx.fillStyle = MODULE_COLORS[i];
    ctx.fill();
});

ctx.font = "bold 11px system-ui";
ctx.fillStyle = "#04162E";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
angles.forEach(function(a, i) {
    var lx = cx + (R + 20) * Math.cos(a);
    var ly = cy + (R + 20) * Math.sin(a);
    ctx.fillText(MODULE_ICONS[i], lx, ly);
});
}

document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
