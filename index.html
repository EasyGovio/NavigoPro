<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavigoPro | PACDI Kariyer Değerlendirme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            color: #1a2c3e;
        }

        /* ana container */
        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* header */
        .brand {
            background: #04162E;
            padding: 18px 28px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand h1 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
        }
        .brand h1 span {
            color: #F6B45F;
        }
        .badge {
            font-size: 0.8rem;
            background: #F6B45F20;
            padding: 6px 12px;
            border-radius: 60px;
            color: #F6B45F;
        }

        /* content */
        .view {
            padding: 28px 32px;
        }

        /* dil seçimi / giriş */
        .lang-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .lang-btn {
            background: #eef2f5;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .lang-btn.active {
            background: #04162E;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .start-card {
            text-align: center;
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.02);
            border: 1px solid #e2edf2;
        }
        .start-card h2 {
            font-size: 1.9rem;
            margin-bottom: 16px;
            color: #04162E;
        }
        .start-card p {
            margin: 12px 0;
            color: #2c4b66;
        }
        .btn-primary {
            background: #04162E;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #0a2a4a;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #eef2f5;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        /* modül başlık */
        .module-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .module-icon {
            font-size: 2.6rem;
        }
        .module-title {
            font-size: 1.7rem;
            font-weight: 700;
        }
        .progress-area {
            background: #e9edf2;
            border-radius: 40px;
            height: 8px;
            width: 100%;
            margin: 16px 0 8px;
        }
        .progress-fill {
            background: #F6B45F;
            width: 0%;
            height: 8px;
            border-radius: 40px;
            transition: width 0.25s ease;
        }
        .q-counter {
            font-size: 0.85rem;
            color: #5b7a97;
            margin-bottom: 24px;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.4;
            margin: 28px 0 24px;
            background: #f9fbfd;
            padding: 20px;
            border-radius: 28px;
            border-left: 5px solid #F6B45F;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 28px;
        }
        .option {
            background: #f0f4f9;
            padding: 10px 18px;
            border-radius: 100px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .option.selected {
            background: #04162E;
            color: white;
            border-color: #F6B45F;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .btn-nav {
            background: transparent;
            border: 1px solid #cad2db;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-next {
            background: #04162E;
            color: white;
            border: none;
        }

        /* ara ekran */
        .inter-card {
            text-align: center;
            padding: 20px 0;
        }
        .score-circle {
            font-size: 3.2rem;
            font-weight: 800;
            background: #f0f3f8;
            width: 140px;
            height: 140px;
            line-height: 140px;
            border-radius: 50%;
            margin: 20px auto;
            color: #04162E;
        }
        .motivation {
            font-style: italic;
            margin: 20px 0;
        }

        /* rapor */
        .report-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .bars-container {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }
        .bar-label {
            width: 130px;
            font-weight: 600;
        }
        .bar-bg {
            flex: 1;
            background: #e2e8f0;
            border-radius: 20px;
            height: 28px;
            overflow: hidden;
        }
        .bar-fill {
            height: 28px;
            width: 0%;
            background: #04162E;
            border-radius: 20px;
            transition: width 0.8s ease-out;
        }
        .radar-container {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            background: #fefefe;
            border-radius: 24px;
            margin: 10px 0;
        }
        .profile-card {
            background: #04162E0c;
            padding: 20px;
            border-radius: 28px;
            border-left: 6px solid #F6B45F;
        }
        .special-badge {
            display: inline-block;
            background: #F6B45F;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            margin: 8px 4px;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            color: #5f7f9a;
            border-top: 1px solid #e2edf2;
            padding-top: 20px;
        }
        @media (max-width: 620px) {
            .view { padding: 20px; }
            .question-text { font-size: 1.1rem; }
            .options { gap: 8px; }
        }
        .warning {
            color: #b33;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>

            ["Bei komplexen Problemen zerlegen Sie sie zuerst in Teile.", "In Krisensituationen treffen Sie schnelle und präzise Entscheidungen.", "Arbeiten mit Zahlen fühlt sich an wie Rätsel lösen, nicht wie Last.", "Sie passen sich schnell an technologische Veränderungen an.", "Langfristige Ergebnisse sind Ihnen wichtiger als kurzfristige Gewinne.", "Kritisches Denken nutzen Sie aktiv im Alltag.", "In unsicheren Situationen bewegen Sie sich mit logischen Schätzungen voran.", "Auch unter Zeitdruck behalten Sie systematisches Denken bei.", "Sie können komplexe Themen einfach erklären.", "Außerhalb der Box zu denken macht Ihnen Freude.", "Feedback sehen Sie als Entwicklungschance, nicht als persönlichen Angriff.", "Große Ziele in kleine Schritte zu unterteilen ist eine Ihrer Stärken.", "Sie kombinieren Wissen aus verschiedenen Disziplinen für neue Lösungen.", "Fehleranalyse macht Sie neugierig, statt unangenehm zu sein.", "Sie testen Gelerntes gedanklich, bevor Sie es anwenden."],
            ["Es gibt ein Arbeitsfeld, bei dem Sie die Zeit vergessen.", "Bei abgeschlossenen Projekten motiviert Sie der geschaffene Nutzen mehr als Lob.", "Sie bevorzugen Arbeit, bei der Sie täglich Neues lernen.", "Konkreten Nutzen zu schaffen motiviert Sie.", "Menschen zu führen und zu inspirieren fällt Ihnen leicht.", "Forschen und neue Erkenntnisse entdecken gibt berufliche Erfüllung.", "Unternehmertum und etwas Neues gründen begeistert Sie.", "Arbeit im Gesundheits- und Wohlfahrtsbereich finden Sie sinnvoll.", "Technologieentwicklung oder Software zählen zu Ihren Interessen.", "Bildung und Wissensvermittlung gibt Ihnen Sinn.", "Führungspositionen fühlen sich wie Chance an, nicht Last.", "Für berufliche Erfüllung müssen Sie gesellschaftliche Wirkung sehen.", "Experte in einem Bereich zu sein ist reizvoller als vieles oberflächlich zu wissen.", "Zur Entwicklung anderer beizutragen erfüllt Sie beruflich.", "Wenn Mittel unbegrenzt wären, wissen Sie genau, was Sie morgen früh tun würden."],
            ["Wenn Sie eine Auszeichnung erhalten, die Sie nicht verdient haben, fühlen Sie sich unwohl.", "Bei Einstellungen sollte Leistung entscheidender sein als Erfahrung.", "Projekte für benachteiligte Gruppen begeistern Sie.", "Aktiv Ungleichheit zu reduzieren ist Ihre Verantwortung.", "Der gesellschaftliche Beitrag Ihrer Branche ist für Berufswahl entscheidend.", "Leistungsbewertung ohne Chancengleichheit ist für Sie sinnlos.", "Bei Ungerechtigkeit ergreifen Sie Maßnahmen zur Veränderung.", "Klimawandel und Umwelt beeinflussen Ihre Berufsentscheidungen.", "Migration und Integration interessieren Sie persönlich und beruflich.", "Digitale Spaltung ist ein Problem, das gelöst werden muss.", "Mitarbeiterwohl sollte vor Aktionärsrendite kommen.", "Sozialunternehmertum ist sinnvoller als traditionelles Unternehmertum.", "Einkommensungleichheit beunruhigt Sie persönlich und beruflich.", "Messbaren sozialen Nutzen zu schaffen ist Kernmotivation Ihrer Karriere.", "Ein Beruf, der viel verdient aber keinen gesellschaftlichen Nutzen bringt, ist nicht geeignet."],
            ["Wenn Sie etwas mit eigenen Händen fertigstellen, empfinden Sie tiefe Zufriedenheit.", "Etwas Defektes zu reparieren ist eine Herausforderung.", "Möbelaufbau und Reparaturen machen Ihnen Freude.", "Sie lieben es, ein Werkzeug zu verstehen, indem Sie es ausprobieren.", "Sie produzieren lieber physisch, als am Computer zu sitzen.", "Um Maschinen zu verstehen, probieren Sie lieber praktisch als Handbuch zu lesen.", "Schreinerei, Elektrik oder handwerkliche Kurse interessieren Sie.", "Die Idee, eigener Chef zu sein, begeistert Sie.", "Sie möchten ein Handwerk meistern und eigene Werkstatt eröffnen.", "Ein neues Werkzeug oder Maschine zu lernen begeistert mich.", "Lernen in Meister-Lehre ist ideal für mich.", "Ich achte auf kleinste Details bei meiner Arbeit.", "Qualität ist mir wichtiger als Geschwindigkeit.", "Für Langlebigkeit eines Produkts gebe ich extra Mühe.", "Ich möchte Arbeit mit stolz unterschreibbarer Qualität abliefern."],
            ["Selbst in stressigen Zeiten achten Sie auf Ihren Schlafrhythmus.", "Bewegung ist für Sie Bedürfnis, keine Pflicht.", "Work-Life-Balance ist eine nicht verhandelbare Grenze.", "Ihnen ist bewusst, dass emotionale Verfassung die Arbeitsleistung beeinflusst.", "Ernährungsgewohnheiten prägen Ihre langfristige Gesundheit.", "Bei starkem Stress nehmen Sie Körpersignale wahr.", "Psychische Gesundheit ist genauso wichtig wie physische.", "Regelmäßige Gesundheitschecks sind Priorität.", "Sie glauben, dass chronische Krankheiten mit Lebensstil zusammenhängen.", "Zeit ohne digitale Bildschirme tut Ihnen gut.", "Starke soziale Bindungen sind für psychische Gesundheit wichtig.", "Gesund zu sein ist Grundvoraussetzung für beruflichen Erfolg.", "Kurze Pausen steigern Ihre Produktivität.", "In Ihre Gesundheit zu investieren ist die beste Investition.", "Gesundheitskompetenz ist eine grundlegende Fähigkeit."]
        ];
        for(let i=0;i<6;i++){
            EN.push(enMap[i]);
            DE.push(deMap[i]);
        }
        return {tr:TR_QUESTIONS, en:EN, de:DE};
    }
    const QUESTIONS = buildLangQuestions();

    // Likert seçenekleri (0-5 arası değerler)
    const LIKERT_VALUES = [0, 1.25, 2.5, 3.75, 5];
    const LIKERT_LABELS = {
        tr: ["Kesinlikle Katılmıyorum", "Katılmıyorum", "Kararsızım", "Katılıyorum", "Kesinlikle Katılıyorum"],
        en: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        de: ["Stimme gar nicht zu", "Stimme nicht zu", "Unentschieden", "Stimme zu", "Stimme voll zu"]
    };

    // Uygulama durumu
    let currentLang = "tr";
    let appState = "language"; // language, entry, module, inter, report
    let moduleAnswers = [[],[],[],[],[],[]]; // her modül için cevap değerleri (0-5)
    let currentModule = 0;      // 0-5
    let currentQuestion = 0;
    let moduleScores = [0,0,0,0,0,0]; // her modülün ortalaması

    const ui = document.getElementById("dynamicView");
    function render() {
        if(appState === "language") renderLanguageScreen();
        else if(appState === "entry") renderEntryScreen();
        else if(appState === "module") renderModuleScreen();
        else if(appState === "inter") renderInterScreen();
        else if(appState === "report") renderReportScreen();
    }
    function renderLanguageScreen() {
        ui.innerHTML = `
            <div class="lang-selector">
                <button class="lang-btn ${currentLang==='tr'?'active':''}" data-lang="tr">TÜRKÇE</button>
                <button class="lang-btn ${currentLang==='de'?'active':''}" data-lang="de">DEUTSCH</button>
                <button class="lang-btn ${currentLang==='en'?'active':''}" data-lang="en">ENGLISH</button>
            </div>
            <div class="start-card">
                <h2>🧭 NavigoPro | PACDI</h2>
                <p>${currentLang==='tr'?'6 modül, 90 soru ile kariyer profilinizi keşfedin.':currentLang==='de'?'Entdecken Sie Ihr Karriereprofil mit 6 Modulen, 90 Fragen.':'Discover your career profile with 6 modules, 90 questions.'}</p>
                <button id="startBtn" class="btn-primary">${currentLang==='tr'?'Başla':currentLang==='de'?'Start':'Start'}</button>
            </div>
        `;
        document.querySelectorAll(".lang-btn").forEach(btn => btn.addEventListener("click", (e)=>{
            currentLang = btn.dataset.lang;
            renderLanguageScreen();
        }));
        document.getElementById("startBtn")?.addEventListener("click",()=>{ appState="entry"; render(); });
    }
    function renderEntryScreen(){
        ui.innerHTML = `<div class="start-card"><h2>📋 ${currentLang==='tr'?'Kariyer Değerlendirmesine Hoş Geldiniz':currentLang==='de'?'Willkommen zur Karrierebewertung':'Welcome to Career Assessment'}</h2><p>${currentLang==='tr'?'6 modül, her biri 15 soru. Cevaplarınızı kaydedip ilerleyin. Geri dönüp cevapları değiştirebilirsiniz.':'6 Module, je 15 Fragen. Sie können zurück und Antworten ändern.':'6 modules, 15 questions each. You can go back and change answers.'}</p><button id="startModules" class="btn-primary">${currentLang==='tr'?'Modül 1\'e Başla':currentLang==='de'?'Start Modul 1':'Start Module 1'}</button></div>`;
        document.getElementById("startModules")?.addEventListener("click",()=>{ currentModule=0; currentQuestion=0; appState="module"; render(); });
    }
    function renderModuleScreen(){
        const qText = QUESTIONS[currentLang][currentModule][currentQuestion];
        const selectedVal = moduleAnswers[currentModule][currentQuestion];
        const optionsHtml = LIKERT_LABELS[currentLang].map((label,idx)=>{
            const val = LIKERT_VALUES[idx];
            const isSelected = (selectedVal !== undefined && Math.abs(selectedVal-val)<0.01);
            return `<div class="option ${isSelected?'selected':''}" data-val="${val}">${label}</div>`;
        }).join('');
        const progressPercent = ((currentQuestion)/15)*100;
        const modName = MODULE_NAMES[currentLang][currentModule];
        const icon = MODULE_ICONS[currentModule];
        ui.innerHTML = `
            <div class="module-header"><div><span class="module-icon">${icon}</span> <span class="module-title">${modName}</span></div><div>${currentLang==='tr'?`Modül ${currentModule+1}/6`:`Module ${currentModule+1}/6`}</div></div>
            <div class="progress-area"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
            <div class="q-counter">${currentLang==='tr'?`Soru ${currentQuestion+1} / 15`:`Question ${currentQuestion+1} / 15`}</div>
            <div class="question-text">${qText}</div>
            <div class="options" id="optionsContainer">${optionsHtml}</div>
            <div class="nav-buttons"><button id="backBtn" class="btn-nav" ${currentQuestion===0?'disabled style="opacity:0.5"':''}>${currentLang==='tr'?'← Geri':currentLang==='de'?'← Zurück':'← Back'}</button>
            <button id="nextBtn" class="btn-nav btn-next">${currentLang==='tr'? (currentQuestion===14?'Modülü Bitir':'İleri →'):currentLang==='de'?(currentQuestion===14?'Modul abschließen':'Weiter →'):(currentQuestion===14?'Finish Module':'Next →')}</button></div>
            <div id="warningMsg" class="warning"></div>
        `;
        document.querySelectorAll(".option").forEach(opt => {
            opt.addEventListener("click",()=>{
                const val = parseFloat(opt.dataset.val);
                moduleAnswers[currentModule][currentQuestion] = val;
                renderModuleScreen();
            });
        });
        document.getElementById("backBtn")?.addEventListener("click",()=>{ if(currentQuestion>0){ currentQuestion--; renderModuleScreen(); } });
        document.getElementById("nextBtn")?.addEventListener("click",()=>{
            if(moduleAnswers[currentModule][currentQuestion] === undefined){
                document.getElementById("warningMsg").innerText = currentLang==='tr'?'Lütfen bir cevap seçin':currentLang==='de'?'Bitte wählen Sie eine Antwort':'Please select an answer';
                return;
            }
            if(currentQuestion === 14){
                let sum = moduleAnswers[currentModule].reduce((a,b)=>a+b,0);
                moduleScores[currentModule] = sum/15;
                appState = "inter";
                render();
            } else { currentQuestion++; renderModuleScreen(); }
        });
    }
    function renderInterScreen(){
        const score = moduleScores[currentModule];
        const motMsgs = {tr:["Harika ilerliyorsun!","Kendini tanımaya devam et","Güçlü yönlerin ortaya çıkıyor"], de:["Großartig!","Erkenne dich selbst","Stärken werden sichtbar"], en:["Great progress!","Keep discovering yourself","Your strengths emerge"]};
        const msgIdx = Math.floor(Math.random()*3);
        const msg = motMsgs[currentLang][msgIdx];
        ui.innerHTML = `<div class="inter-card"><h3>✅ ${currentLang==='tr'?'Modül Tamamlandı':currentLang==='de'?'Modul abgeschlossen':'Module Completed'}</h3><div class="score-circle" id="animScore">0.0</div><p class="motivation">${msg}</p><button id="nextModuleBtn" class="btn-primary">${currentLang==='tr'?'Sonraki Modüle Geç →':currentLang==='de'?'Nächstes Modul →':'Next Module →'}</button></div>`;
        let animVal = 0;
        const target = score;
        const interval = setInterval(()=>{ if(animVal+0.2>=target){ document.getElementById("animScore").innerText=target.toFixed(1); clearInterval(interval);} else { animVal+=0.2; document.getElementById("animScore").innerText=animVal.toFixed(1);} }, 25);
        document.getElementById("nextModuleBtn")?.addEventListener("click",()=>{
            if(currentModule+1<6){ currentModule++; currentQuestion=0; appState="module"; render();}
            else { appState="report"; render();}
        });
    }
    function renderReportScreen(){
        const avgScore = moduleScores.reduce((a,b)=>a+b,0)/6;
        const thresholds = [4.0,4.0,4.0,4.0,3.5,4.0];
        const highModules = moduleScores.map((s,i)=> s>=thresholds[i] ? i : -1).filter(i=>i!==-1);
        let profileName="";
        if(highModules.length===1){
            const names=["Etik Lider","Analitik Düşünür","Tutkulu Profesyonel","Sosyal Dönüştürücü","Usta Adayı","Bilinçli Yaşam Savunucusu"];
            profileName=names[highModules[0]];
        } else if(highModules.length>1){
            const combo = highModules.map(i=>MODULE_NAMES[currentLang][i].split(" ")[0]).join("-");
            profileName=`${combo} Bileşik Profili`;
        } else profileName = currentLang==='tr'?"Gelişim Odaklı Profil":currentLang==='de'?"Entwicklungsorientiertes Profil":"Development Focused Profile";
        let careerRec = [];
        if(highModules.includes(0)) careerRec.push("Etik Kurul Danışmanlığı, Kurumsal Yönetişim");
        if(highModules.includes(1)) careerRec.push("Veri Analisti, Stratejik Planlama");
        if(highModules.includes(2)) careerRec.push("Girişimcilik, Yaratıcı Endüstriler");
        if(highModules.includes(3)) careerRec.push("Sivil Toplum, Kamu Politikası, Sosyal Girişim");
        if(highModules.includes(4)) careerRec.push("Ustalık Girişimciliği, Teknik Tasarım");
        if(highModules.includes(5)) careerRec.push("Sağlık Yönetimi, Wellness Koçluğu");
        while(careerRec.length<3) careerRec.push("Danışmanlık, Liderlik Gelişimi");
        const top3 = careerRec.slice(0,3);
        const barsHtml = moduleScores.map((s,i)=> `<div class="bar-item"><div class="bar-label">${MODULE_NAMES[currentLang][i]}</div><div class="bar-bg"><div class="bar-fill" data-score="${s/5*100}" style="width:0%"></div></div><div>${s.toFixed(1)}</div></div>`).join('');
        ui.innerHTML = `<div class="report-grid"><div class="bars-container"><h3>📊 ${currentLang==='tr'?'Modül Skorları':currentLang==='de'?'Modul-Scores':'Module Scores'}</h3>${barsHtml}</div>
        <div class="radar-container"><h3>🎯 PACDI Radar</h3><canvas id="radarCanvas" width="400" height="400" style="max-width:100%; height:auto"></canvas></div>
        <div class="profile-card"><h3>🏆 ${currentLang==='tr'?'Ana Profiliniz':currentLang==='de'?'Ihr Hauptprofil':'Your Main Profile'}</h3><p><strong>${profileName}</strong> – ${currentLang==='tr'?'PACDI Genel Skor: '+avgScore.toFixed(2):currentLang==='de'?'PACDI Gesamtscore: '+avgScore.toFixed(2):'PACDI Overall Score: '+avgScore.toFixed(2)}</p>${moduleScores[4]>=3.5?`<div class="special-badge">🔧 ${currentLang==='tr'?'Usta Adayı Kartı':currentLang==='de'?'Meister-Anwärter Karte':'Master Candidate Card'}</div>`:''}${moduleScores[5]>=4.0?`<div class="special-badge">🌿 ${currentLang==='tr'?'Refah Kartı (Bilinçli Yaşam)':currentLang==='de'?'Wohlfühlkarte (Bewusstes Leben)':'Wellbeing Card'}</div>`:''}<h4>✨ ${currentLang==='tr'?'Önerilen 3 Kariyer Alanı':currentLang==='de'?'3 Empfohlene Karrierefelder':'3 Recommended Career Fields'}</h4><ul>${top3.map(t=>`<li>${t}</li>`).join('')}</ul><p>📧 Geri bildirim: <a href="mailto:info@navigopro.de">info@navigopro.de</a></p></div><div class="footer-note">© 2026 PACDI — navigopro.de · TÜRKPATENT Tescil · Lisanslı değerlendirme</div></div>`;
        setTimeout(()=>{ document.querySelectorAll(".bar-fill").forEach(el=>{ const w=el.dataset.score; el.style.width=w+"%"; }); drawRadar(); },100);
    }
    function drawRadar(){
        const canvas = document.getElementById("radarCanvas");
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w=400, h=400;
        canvas.width=w; canvas.height=h;
        const centerX=w/2, centerY=h/2, radius=140;
        const angles = [0,60,120,180,240,300].map(d=> d*Math.PI/180);
        const scores = moduleScores.map(s=>s/5);
        ctx.clearRect(0,0,w,h);
        ctx.beginPath(); ctx.strokeStyle="#ccc"; ctx.fillStyle="#f0f3fa";
        for(let i=0;i<=5;i++){ const r = radius*i/5; ctx.beginPath(); angles.forEach((ang,idx)=>{ let x=centerX+r*Math.cos(ang), y=centerY+r*Math.sin(ang); if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.closePath(); ctx.stroke(); }
        ctx.beginPath(); angles.forEach((ang,idx)=>{ let val=scores[idx]; let r2 = radius*val; let x=centerX+r2*Math.cos(ang), y=centerY+r2*Math.sin(ang); if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.closePath(); ctx.fillStyle="#04162Eaa"; ctx.fill(); ctx.strokeStyle="#F6B45F"; ctx.lineWidth=3; ctx.stroke();
        angles.forEach((ang,i)=>{ let x=centerX+(radius+12)*Math.cos(ang), y=centerY+(radius+12)*Math.sin(ang); ctx.fillStyle="#04162E"; ctx.font="bold 12px system-ui"; ctx.fillText(MODULE_NAMES[currentLang][i].substring(0,2), x-8, y-4); });
    }
    render();
</script>
</body>
</html>
